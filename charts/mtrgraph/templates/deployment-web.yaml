apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "mtrgraph.fullname" . }}-web
  labels:
    {{- include "mtrgraph.labels" . | nindent 4 }}
    app.kubernetes.io/component: web
spec:
  replicas: {{ .Values.replicaCount }}
  strategy:
    type: Recreate                          # SQLite mono-writer
  selector:
    matchLabels:
      {{- include "mtrgraph.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: web
  template:
    metadata:
      labels:
        {{- include "mtrgraph.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: web
    spec:
      securityContext:
        {{- toYaml .Values.securityContext | nindent 8 }}
      containers:
        - name: web
          image: {{ include "mtrgraph.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["python", "-m", "mtrgraph.cli"]
          args:
            - "web"
            - "--host"
            - "0.0.0.0"
            - "--port"
            - "8765"
            - "--db"
            - "/data/mtrgraph.db"
          env:
            - name: MTRGRAPH_RETENTION_DAYS
              value: {{ .Values.retention.days | quote }}
            - name: MTRGRAPH_RETENTION_PERIOD_HOURS
              value: {{ .Values.retention.periodHours | quote }}
          {{- if .Values.s3Credentials.enabled }}
          envFrom:
            - secretRef:
                name: {{ include "mtrgraph.s3SecretName" . }}
          {{- end }}
          ports:
            - name: http
              containerPort: 8765
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /data
          readinessProbe:
            httpGet:
              path: /
              port: 8765
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 8765
            initialDelaySeconds: 15
            periodSeconds: 30
      volumes:
        - name: data
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "mtrgraph.fullname" . }}-data
          {{- else }}
          emptyDir: {}
          {{- end }}
