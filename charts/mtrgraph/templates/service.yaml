apiVersion: v1
kind: Service
metadata:
  name: {{ include "mtrgraph.fullname" . }}-web
  labels:
    {{- include "mtrgraph.labels" . | nindent 4 }}
    app.kubernetes.io/component: web
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "mtrgraph.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: web
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
